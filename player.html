<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>選手管理</title>

<link rel="stylesheet" href="css/style.css">

<style>

.container{

width:900px;

margin:auto;

padding:30px;

}

input,select{

padding:10px;

margin:5px;

font-size:16px;

}

button{

padding:10px 20px;

font-size:16px;

cursor:pointer;

}

table{

width:100%;

margin-top:20px;

border-collapse:collapse;

background:white;

}

th,td{

border:1px solid #999;

padding:10px;

text-align:center;

}

th{

background:#003366;

color:white;

}

.back{

margin-top:30px;

}

</style>

</head>

<body>

<header>

<h1>👤 選手管理</h1>

</header>

<div class="container">

<input
type="number"
id="number"
placeholder="背番号">

<input
type="text"
id="name"
placeholder="名前">

<select id="position">

<option>GK</option>

<option>CF</option>

<option>Driver</option>

<option>Wing</option>

<option>Point</option>

</select>

<select id="hand">

<option>右</option>

<option>左</option>

</select>

<button onclick="addPlayer()">

登録

</button>

<table>

<thead>

<tr>

<th>背番号</th>

<th>名前</th>

<th>ポジション</th>

<th>利き手</th>

<th>削除</th>

</tr>

</thead>

<tbody id="playerTable">

</tbody>

</table>

<div class="back">

<a href="index.html">

<button>ホームへ戻る</button>

</a>

</div>

</div>

<script>

let players=[];

if(localStorage.getItem("players")){

players=
JSON.parse(localStorage.getItem("players"));

showPlayers();

}

function addPlayer(){

const number=
document.getElementById("number").value;

const name=
document.getElementById("name").value;

const position=
document.getElementById("position").value;

const hand=
document.getElementById("hand").value;

if(number==""||name==""){

alert("入力してください");

return;

}

players.push({

number:number,

name:name,

position:position,

hand:hand

});

localStorage.setItem(

"players",

JSON.stringify(players)

);

showPlayers();

document.getElementById("number").value="";
document.getElementById("name").value="";

}

function showPlayers(){

let html="";

players.forEach(function(p,index){

html+=`

<tr>

<td>${p.number}</td>

<td>${p.name}</td>

<td>${p.position}</td>

<td>${p.hand}</td>

<td>

<button onclick="deletePlayer(${index})">

削除

</button>

</td>

</tr>

`;

});

document.getElementById("playerTable").innerHTML=html;

}

function deletePlayer(index){

players.splice(index,1);

localStorage.setItem(

"players",

JSON.stringify(players)

);

showPlayers();

}

</script>

</body>

</html>
