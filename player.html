<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>選手管理</title>

<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/player.css">

</head>

<body>

<header>

<h1>👤 選手管理</h1>

</header>

<main>

<div class="form">

<input
type="number"
id="number"
placeholder="背番号">

<input
type="text"
id="name"
placeholder="名前">

<select id="position">

<option>GK</option>

<option>FP</option>

</select>

<button id="addBtn">

＋選手追加

</button>

</div>

<table>

<thead>

<tr>

<th>No</th>

<th>名前</th>

<th>ポジション</th>

<th>削除</th>

</tr>

</thead>

<tbody id="playerTable">

</tbody>

</table>

<a href="index.html">

<button class="homeButton">

🏠 ホームへ戻る

</button>

</a>

</main>

<script type="module" src="js/player.js"></script>

</body>

</html>
