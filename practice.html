<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>練習記録 | WaterPolo Analyzer</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/practice.css">
</head>

<body>

<header>
    <h1>🏊 練習シュート記録</h1>
</header>

<main>

    <section class="control">

        <select id="player">
            <option value="">選手を選択</option>
        </select>

        <input type="date" id="date">

        <select id="menu">
            <option value="通常シュート">通常シュート</option>
            <option value="速攻">速攻</option>
            <option value="センター">センター</option>
            <option value="5mシュート">5mシュート</option>
            <option value="カウンター">カウンター</option>
        </select>

        <select id="result">
            <option value="goal">ゴール</option>
            <option value="miss">外れ</option>
            <option value="gk">GKセーブ</option>
        </select>

        <button id="saveBtn">
            登録
        </button>

    </section>


    <h2>シュート位置</h2>

    <div id="court">

        <div class="centerLine"></div>

        <div class="goal leftGoal"></div>

        <div class="goal rightGoal"></div>

    </div>

    <p id="position">
        コートをクリックしてください
    </p>


    <h2>記録一覧</h2>

    <table>

        <thead>

            <tr>

                <th>日付</th>

                <th>選手</th>

                <th>練習</th>

                <th>結果</th>

                <th>位置</th>

                <th>削除</th>

            </tr>

        </thead>

        <tbody id="practiceTable">

        </tbody>

    </table>

    <br>

    <a href="index.html">

        <button>

            🏠 ホームへ戻る

        </button>

    </a>

</main>

<script type="module" src="js/practice.js"></script>

</body>

</html>
