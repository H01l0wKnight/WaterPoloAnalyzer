<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>練習記録</title>

<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/practice.css">

</head>

<body>

<header>

<h1>🏊 練習記録</h1>

</header>

<main>

<div class="control">

<select id="player"></select>

<input type="date" id="date">

<select id="menu">

<option>シュート練習</option>

<option>速攻</option>

<option>センター</option>

<option>5mシュート</option>

<option>カウンター</option>

</select>

<select id="result">

<option value="goal">ゴール</option>

<option value="miss">外れ</option>

<option value="gk">GKセーブ</option>

</select>

<button id="saveBtn">

登録

</button>

</div>

<div id="court">

<div class="center"></div>

<div class="goal left"></div>

<div class="goal right"></div>

</div>

<p id="position">

コートをクリックしてください

</p>

<h2>

記録一覧

</h2>

<table>

<thead>

<tr>

<th>日付</th>

<th>選手</th>

<th>メニュー</th>

<th>結果</th>

</tr>

</thead>

<tbody id="practiceTable">

</tbody>

</table>

<br>

<a href="index.html">

<button>

🏠ホームへ戻る

</button>

</a>

</main>

<script type="module" src="js/practice.js"></script>

</body>

</html>
