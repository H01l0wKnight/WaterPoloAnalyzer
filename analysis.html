<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>水球分析</title>

<link rel="stylesheet" href="css/style.css">


<style>

.container{

width:1000px;

margin:auto;

padding:30px;

}



.card{

display:inline-block;

width:220px;

background:white;

padding:20px;

margin:10px;

border-radius:10px;

box-shadow:0 0 5px gray;

}



.number{

font-size:30px;

font-weight:bold;

color:#003366;

}



table{

width:100%;

border-collapse:collapse;

margin-top:20px;

background:white;

}



th,td{

border:1px solid #999;

padding:10px;

text-align:center;

}



th{

background:#003366;

color:white;

}



button{

padding:10px 20px;

font-size:16px;

cursor:pointer;

}



select{

padding:10px;

font-size:16px;

margin:5px;

}



/* コート */

#analysisCourt{

position:relative;

width:900px;

height:450px;

margin:30px auto;

background:#4FC3F7;

border:5px solid white;

box-shadow:0 0 10px gray;

}



.centerLine{

position:absolute;

left:50%;

top:0;

width:3px;

height:100%;

background:white;

}



.goal{

position:absolute;

width:12px;

height:100px;

background:red;

top:175px;

}



#leftGoal{

left:0;

}



#rightGoal{

right:0;

}



.analysisMarker{

position:absolute;

width:18px;

height:18px;

border-radius:50%;

transform:translate(-50%,-50%);

border:2px solid white;

}



.success{

background:#00cc00;

}



.failure{

background:#ff0000;

}


</style>

</head>



<body>


<h1>
🏊 水球アナリスト分析
</h1>


<div class="container">



<h2>
📘 練習分析
</h2>



<div class="card">

<h3>シュート数</h3>

<p class="number" id="practiceShot">0</p>

</div>



<div class="card">

<h3>成功数</h3>

<p class="number" id="practiceGoal">0</p>

</div>



<div class="card">

<h3>成功率</h3>

<p class="number" id="practiceRate">0%</p>

</div>






<table>

<thead>

<tr>

<th>選手</th>

<th>シュート</th>

<th>成功</th>

<th>成功率</th>

</tr>

</thead>


<tbody id="practiceTable">

</tbody>


</table>







<h2>
🏆 試合分析
</h2>



<div class="card">

<h3>シュート数</h3>

<p class="number" id="matchShot">0</p>

</div>




<div class="card">

<h3>得点</h3>

<p class="number" id="matchGoal">0</p>

</div>




<div class="card">

<h3>成功率</h3>

<p class="number" id="matchRate">0%</p>

</div>







<table>

<thead>

<tr>

<th>選手</th>

<th>シュート</th>

<th>得点</th>

<th>成功率</th>

</tr>

</thead>


<tbody id="matchTable">

</tbody>


</table>







<h2>

📍 シュート位置分析

</h2>




<select id="playerFilter">

<option value="all">

全選手

</option>

</select>




<select id="dataFilter">



<option value="practice">

練習

</option>


<option value="match">

試合

</option>


</select>

<select id="periodFilter">

<option value="all">全Q</option>

<option value="1Q">1Q</option>

<option value="2Q">2Q</option>

<option value="3Q">3Q</option>

<option value="4Q">4Q</option>

</select>





<div id="analysisCourt">


<div class="centerLine"></div>


<div class="goal" id="leftGoal"></div>


<div class="goal" id="rightGoal"></div>


</div>





<br>


<a href="index.html">

<button>

🏠 ホームへ戻る

</button>

</a>



</div>








<script>



// =====================
// データ取得
// =====================


const practices=

JSON.parse(localStorage.getItem("practices")) || [];



const matches=

JSON.parse(localStorage.getItem("matches")) || [];







// =====================
// 練習分析
// =====================


let practiceData={};



practices.forEach(p=>{


if(!practiceData[p.player]){


practiceData[p.player]={

shot:0,

goal:0

};


}



practiceData[p.player].shot++;



if(p.result=="goal"){

practiceData[p.player].goal++;

}


});




let ps=0;

let pg=0;



Object.values(practiceData)

.forEach(p=>{


ps+=p.shot;

pg+=p.goal;


});



document.getElementById("practiceShot").innerHTML=ps;


document.getElementById("practiceGoal").innerHTML=pg;


document.getElementById("practiceRate").innerHTML=


ps>0?

((pg/ps)*100).toFixed(1)+"%"

:

"0%";





let ph="";



Object.keys(practiceData)

.forEach(name=>{


let p=practiceData[name];


ph+=`

<tr>

<td>${name}</td>

<td>${p.shot}</td>

<td>${p.goal}</td>

<td>${((p.goal/p.shot)*100).toFixed(1)}%</td>

</tr>

`;

});


document.getElementById("practiceTable").innerHTML=ph;







// =====================
// 試合分析
// =====================


let matchData={};



matches.forEach(m=>{


if(!matchData[m.player]){


matchData[m.player]={

shot:0,

goal:0

};


}



matchData[m.player].shot++;



if(m.result=="goal"){

matchData[m.player].goal++;

}


});




let ms=0;

let mg=0;



Object.values(matchData)

.forEach(m=>{


ms+=m.shot;

mg+=m.goal;


});



document.getElementById("matchShot").innerHTML=ms;


document.getElementById("matchGoal").innerHTML=mg;


document.getElementById("matchRate").innerHTML=


ms>0?

((mg/ms)*100).toFixed(1)+"%"

:

"0%";




let mh="";



Object.keys(matchData)

.forEach(name=>{


let m=matchData[name];


mh+=`

<tr>

<td>${name}</td>

<td>${m.shot}</td>

<td>${m.goal}</td>

<td>${((m.goal/m.shot)*100).toFixed(1)}%</td>

</tr>

`;

});


document.getElementById("matchTable").innerHTML=mh;








// =====================
// 選手リスト作成
// =====================


let players=[];



practices.forEach(p=>{


if(!players.includes(p.player))

players.push(p.player);


});



matches.forEach(p=>{


if(!players.includes(p.player))

players.push(p.player);


});





players.forEach(p=>{


let option=

document.createElement("option");


option.value=p;


option.textContent=p;



document.getElementById("playerFilter")

.appendChild(option);


});








// =====================
// シュート位置表示
// =====================


function showPosition(){



document.querySelectorAll(".analysisMarker")

.forEach(m=>m.remove());




let type=

document.getElementById("dataFilter").value;



let player=

document.getElementById("playerFilter").value;



let data=[];



if(type=="practice")

data=practices;


else

data=matches;





data.forEach(s=>{


if(player!="all" && s.player!=player)

return;




let marker=

document.createElement("div");



marker.classList.add("analysisMarker");



if(s.result=="goal")

marker.classList.add("success");

else

marker.classList.add("failure");



marker.style.left=s.x+"px";


marker.style.top=s.y+"px";



document.getElementById("analysisCourt")

.appendChild(marker);



});



}





showPosition();



document.getElementById("playerFilter")

.addEventListener(

"change",

showPosition

);



document.getElementById("dataFilter")

.addEventListener(

"change",

showPosition

);



</script>


</body>

</html>
