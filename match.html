<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>試合シュート記録</title>

<link rel="stylesheet" href="css/match.css">

</head>


<body>


<header>

<h1>🏐 試合シュート記録</h1>

<a href="index.html">ホームへ戻る</a>

</header>



<main>


<section class="inputArea">


<h2>シュート情報</h2>


<label>
選手

<select id="playerSelect">

<option value="">選手を選択</option>

</select>

</label>



<label>
クォーター

<select id="quarter">

<option>1Q</option>
<option>2Q</option>
<option>3Q</option>
<option>4Q</option>

</select>

</label>



<label>
時間

<input id="gameTime" type="time">

</label>



<label>
シュート種類

<select id="shotType">

<option>通常シュート</option>
<option>ドライブ</option>
<option>カウンター</option>
<option>ペナルティ</option>

</select>

</label>


<p>
コートをクリックしてください
</p>


<div id="court">

<div id="goal"></div>

<div id="centerLine"></div>


</div>



<div class="result">

<button id="goalBtn">
〇 成功
</button>


<button id="missBtn">
× 失敗
</button>

</div>


</section>



<section>


<h2>記録一覧</h2>


<table>


<thead>

<tr>

<th>選手</th>
<th>Q</th>
<th>時間</th>
<th>種類</th>
<th>結果</th>

</tr>

</thead>


<tbody id="recordList">

</tbody>


</table>


</section>


</main>



<script src="js/match.js"></script>


</body>


</html>
